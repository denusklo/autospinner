# Status: SKELETON
# Purpose: Repository-scoped Codex safety defaults and agent concurrency caps.
# Readers: Codex runtime, Commander, and harness reviewers.
# Source of truth: AGENTS.md and docs/codex-harness/01-HARNESS-LEAK-DIAGNOSIS.md.
# Remaining: verify every key, enable hooks only after scripts pass tests, and document limitations.

sandbox_mode = "workspace-write"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = false

[agents]
max_depth = 1
max_threads = 3

[features]
hooks = false

