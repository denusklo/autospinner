# Status: COMPLETE
# Purpose: Repository-scoped Codex safety defaults and bounded agent concurrency.
# Readers: Codex runtime, Commander, and harness reviewers.
# Source of truth: AGENTS.md and docs/codex-harness/01-HARNESS-LEAK-DIAGNOSIS.md.
# Hooks are defined only in .codex/hooks.json. No project MCP server is added.

sandbox_mode = 'workspace-write'
approval_policy = 'on-request'

[sandbox_workspace_write]
network_access = false

[agents]
max_depth = 1
max_threads = 3

[features]
hooks = true
multi_agent = true
